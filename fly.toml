# fly.toml app configuration file generated for accountex-withered-frost-9329 on 2025-03-15T08:55:09-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'accountex'
primary_region = 'yul'
kill_signal = 'SIGTERM'

[build]

[deploy]
  release_command = '/app/bin/migrate'

  [deploy.release_command_vm]
    size = "performance-1x"
    memory = "2gb"
[env]
  PHX_HOST = 'accountex.fly.dev'
  PORT = '8080'
  PRIMARY_REGION = "yul"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  size = "performance-1x"
  cpu_kind = 'performance'
  memory = 2048
  cpus = 1
